name: ci

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2

      - name: Install bubblewrap (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap

      - name: Verify bubblewrap (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: command -v bwrap

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-llvm-cov
        if: matrix.os == 'ubuntu-latest'
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Build Broski CLI
        run: cargo build -p broski-cli

      - name: Run quality gate (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo fmt --all --check
          cargo clippy --workspace --all-targets --all-features -- -D warnings
          cargo test --workspace --all-features
          cargo llvm-cov --workspace --all-features --summary-only --fail-under-lines ${BROSKI_COVERAGE_MIN:-50}

      - name: Run quality gate (macOS fast path)
        if: matrix.os == 'macos-latest'
        run: ./target/debug/broski --workspace . run test

  showcase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2

      - name: Install bubblewrap
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap
          command -v bwrap

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: examples/showcase/frontend/package-lock.json

      - name: Build Broski CLI
        run: cargo build -p broski-cli

      - name: Build showcase UI and API
        run: |
          cd examples/showcase
          ../../target/debug/broski --workspace . run build_ui --explain
          ../../target/debug/broski --workspace . run build_api --explain

      - name: Validate showcase health endpoint
        run: |
          cd examples/showcase
          PORT=18080 STATIC_DIR=frontend/dist backend/target/release/showcase-server >/tmp/showcase.log 2>&1 &
          SHOWCASE_PID=$!
          trap 'kill ${SHOWCASE_PID} >/dev/null 2>&1 || true' EXIT
          sleep 2
          curl -fsS http://127.0.0.1:18080/api/health

      - name: Build showcase container artifact
        run: |
          cd examples/showcase
          ../../target/debug/broski --workspace . run package_container --explain
          test -f artifacts/showcase-image.tar
